apiVersion: apps/v1
kind: Deployment
metadata:
  name: dyvine-api
  namespace: dyvine
  labels:
    app.kubernetes.io/name: dyvine
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: dyvine
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dyvine
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dyvine
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: dyvine
    spec:
      serviceAccountName: dyvine-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: ghcr.io/memenow/dyvine:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: dyvine-config
        - secretRef:
            name: dyvine-secrets
        env:
        - name: API_OPERATION_DB_PATH
          value: /app/data/douyin/state/operations.db
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /startupz
            port: http
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: runtime-data
          mountPath: /app/data
        - name: runtime-logs
          mountPath: /app/logs
        - name: runtime-temp
          mountPath: /app/temp_downloads
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      volumes:
      - name: runtime-data
        emptyDir: {}
      - name: runtime-logs
        emptyDir: {}
      - name: runtime-temp
        emptyDir: {}
