# NOTE: The values below are intentionally empty. Real values are injected at
# deploy time by the GitHub Actions deploy workflows via `kubectl create secret
# generic ... --dry-run=client -o yaml | kubectl apply -f -`. We use
# `stringData` (not `data`) so the manifest remains valid YAML and `kubectl
# apply` will not reject it because of malformed base64. Do not populate these
# values in version control.
apiVersion: v1
kind: Secret
metadata:
  name: dyvine-secrets
  namespace: dyvine
  labels:
    app.kubernetes.io/name: dyvine
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: dyvine
type: Opaque
stringData:
  SECURITY_SECRET_KEY: ""
  SECURITY_API_KEY: ""
  R2_ACCOUNT_ID: ""
  R2_ACCESS_KEY_ID: ""
  R2_SECRET_ACCESS_KEY: ""
  DOUYIN_COOKIE: ""
