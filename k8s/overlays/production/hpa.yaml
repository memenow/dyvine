# HPA intentionally pinned to a single replica because the operation store
# uses a RWO PVC with a pod-local SQLite writer. Restore dynamic scaling
# after migrating to a shared operation backend.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dyvine-api-hpa
  namespace: dyvine
  labels:
    app.kubernetes.io/name: dyvine
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: dyvine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dyvine-api
  minReplicas: 1
  maxReplicas: 1
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max
