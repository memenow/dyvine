name: Deploy to Development

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  INGRESS_HOST: ${{ secrets.DEV_INGRESS_HOST || 'dyvine-dev.example.com' }}

jobs:
  deploy:
    name: Deploy to Development Environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # ``pipefail`` makes multi-stage pipes such as
    # ``kubectl create secret ... | kubectl label ... | kubectl apply -f -``
    # fail when an intermediate command (not just the tail) errors out.
    # Without it, a failure in the middle is masked by the 0 exit code of
    # ``kubectl apply -f -`` on empty stdin, and the Secret is silently
    # left unchanged.
    defaults:
      run:
        shell: /bin/bash -euo pipefail {0}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Verify image exists
      run: |
        # The CI workflow generates multiple tags, we'll use the SHA-based tag
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        IMAGE_TAG="main-${SHORT_SHA}"
        IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:${IMAGE_TAG}"
        echo "Checking for image: $IMAGE"
        docker pull $IMAGE || {
          echo "Error: Image $IMAGE not found. Please ensure the CI workflow has completed successfully."
          echo "Expected image tags generated by CI:"
          echo "  - main (branch tag)"
          echo "  - main-${SHORT_SHA} (SHA tag)"
          echo "  - main-latest (latest tag)"
          exit 1
        }

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: github-actions@mmn-ai.iam.gserviceaccount.com

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        install_components: 'gke-gcloud-auth-plugin'

    - name: Configure kubectl
      run: |
        gcloud container clusters get-credentials $GKE_CLUSTER --zone $GKE_ZONE --project $PROJECT_ID

    - name: Create namespace if not exists
      run: |
        kubectl create namespace dyvine --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Application Secrets
      run: |
        # Attach the same ``commonLabels`` the base kustomization applies so
        # a future ``kubectl apply --prune -l app.kubernetes.io/managed-by=kustomize``
        # sweep does not treat this Secret as stray and delete it.
        kubectl create secret generic dyvine-secrets \
          --from-literal=SECURITY_SECRET_KEY="${{ secrets.DEV_SECURITY_SECRET_KEY }}" \
          --from-literal=SECURITY_API_KEY="${{ secrets.DEV_SECURITY_API_KEY }}" \
          --from-literal=R2_ACCOUNT_ID="${{ secrets.R2_ACCOUNT_ID }}" \
          --from-literal=R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
          --from-literal=R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
          --from-literal=DOUYIN_COOKIE="${{ secrets.DOUYIN_COOKIE }}" \
          --namespace=dyvine \
          --dry-run=client -o yaml \
          | kubectl label --local=true -f - --overwrite -o yaml --dry-run=client \
              app.kubernetes.io/managed-by=kustomize \
              app.kubernetes.io/name=dyvine \
              app.kubernetes.io/component=api \
              app.kubernetes.io/part-of=dyvine \
              app.kubernetes.io/version=latest \
          | kubectl apply -f -

    - name: Deploy to Development
      run: |
        # Build a temporary overlay under k8s/overlays/dev-runtime that
        # references the base and applies dev-specific image tag, replicas,
        # and config overrides. Using a dedicated directory keeps the
        # `kubectl apply -k` invocation valid (mixing -k and -f is not
        # supported by kubectl and would fail).
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        RUNTIME_DIR=k8s/overlays/dev-runtime
        # Clean up the scratch kustomization on any exit path, including
        # ``kubectl apply`` failures under ``set -e``.
        trap 'rm -rf "${RUNTIME_DIR}"' EXIT
        mkdir -p "${RUNTIME_DIR}"
        cat > "${RUNTIME_DIR}/kustomization.yaml" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization

        namespace: dyvine

        resources:
          - ../../base

        images:
          - name: ghcr.io/${{ github.repository }}
            newTag: main-${SHORT_SHA}

        patches:
          - path: replicas-patch.yaml
            target:
              kind: Deployment
              name: dyvine-api

        configMapGenerator:
          - name: dyvine-config
            behavior: merge
            literals:
              - API_DEBUG=true
              - API_ENVIRONMENT=development
              - R2_BUCKET_NAME=mmn-dev-data
        EOF

        cat > "${RUNTIME_DIR}/replicas-patch.yaml" << 'EOF'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: dyvine-api
        spec:
          replicas: 1
        EOF

        kubectl apply -k "${RUNTIME_DIR}"

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/dyvine-api -n dyvine --timeout=300s

    - name: Get service status
      run: |
        echo "Deployment completed to development environment"
        kubectl get pods -n dyvine -l app.kubernetes.io/name=dyvine
        kubectl get services -n dyvine
