name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.6"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --all-extras --frozen

    - name: Run tests
      run: uv run pytest --cov=src/dyvine --cov-report=xml --cov-fail-under=80 -W error

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: coverage.xml
        fail_ci_if_error: false

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.6"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --all-extras --frozen

    - name: Check formatting with Black
      run: uv run black --check .

    - name: Check import sorting with isort
      run: uv run isort --check-only .

    - name: Lint with Ruff
      run: uv run ruff check .

    - name: Type check with MyPy
      run: uv run mypy src/

  container-scan:
    name: Container Vulnerability Scan
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image for scanning
      run: |
        # Build the image locally (no push) so we can scan the exact
        # artifact produced by this PR/commit. We intentionally do not
        # authenticate to any registry here so PR-triggered runs from
        # forks cannot access production secrets.
        docker build -t scan-target:${{ github.sha }} .

    - name: Print vulnerability table for log visibility
      # Runs first, non-fatal, so the GitHub Actions log always shows the
      # CVE list even when the SARIF upload step fails or the gate below
      # exits with code 1. Without this, a gate failure leaves no
      # actionable output in stdout because the SARIF step writes to a
      # file only.
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: 'scan-target:${{ github.sha }}'
        format: 'table'
        exit-code: '0'
        severity: 'HIGH,CRITICAL'
        ignore-unfixed: true

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: 'scan-target:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '1'
        severity: 'HIGH,CRITICAL'
        ignore-unfixed: true

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        category: 'trivy-container'

  docker-build:
    name: Build and Push Docker Image
    needs: [test, quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docker-build.yml
    with:
      push: true
      registry: ghcr.io
      image-name: ${{ github.repository }}
    permissions:
      contents: read
      packages: write
