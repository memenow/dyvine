name: Production Deployment

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g., v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  INGRESS_HOST: ${{ secrets.PROD_INGRESS_HOST || 'api.dyvine.app' }}

jobs:
  pre-deployment-checks:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.validate.outputs.tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Validate and get tag
      id: validate
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          TAG="${{ github.event.release.tag_name }}"
        else
          TAG="${{ github.event.inputs.tag }}"
        fi
        
        # Validate tag format
        if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+\.[0-9]+)?$ ]]; then
          echo "Error: Invalid tag format. Expected: v1.0.0 or v1.0.0-rc.1"
          exit 1
        fi
        
        echo "tag=$TAG" >> $GITHUB_OUTPUT
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Verify image exists
      run: |
        IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.validate.outputs.tag }}"
        docker pull $IMAGE || {
          echo "Error: Image $IMAGE not found. Please ensure the release workflow has completed."
          exit 1
        }

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: github-actions@mmn-ai.iam.gserviceaccount.com

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        install_components: 'gke-gcloud-auth-plugin'

    - name: Configure kubectl
      run: |
        gcloud container clusters get-credentials $GKE_CLUSTER --zone $GKE_ZONE --project $PROJECT_ID

    - name: Create namespace if not exists
      run: |
        kubectl create namespace dyvine --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Application Secrets
      run: |
        # Attach the same ``commonLabels`` the base kustomization applies so
        # a future ``kubectl apply --prune -l app.kubernetes.io/managed-by=kustomize``
        # sweep does not treat this Secret as stray and delete it.
        kubectl create secret generic dyvine-secrets \
          --from-literal=SECURITY_SECRET_KEY="${{ secrets.PROD_SECURITY_SECRET_KEY }}" \
          --from-literal=SECURITY_API_KEY="${{ secrets.PROD_SECURITY_API_KEY }}" \
          --from-literal=R2_ACCOUNT_ID="${{ secrets.R2_ACCOUNT_ID }}" \
          --from-literal=R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
          --from-literal=R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
          --from-literal=DOUYIN_COOKIE="${{ secrets.DOUYIN_COOKIE }}" \
          --namespace=dyvine \
          --dry-run=client -o yaml \
          | kubectl label --local=true -f - --overwrite -o yaml --dry-run=client \
              app.kubernetes.io/managed-by=kustomize \
              app.kubernetes.io/name=dyvine \
              app.kubernetes.io/component=api \
              app.kubernetes.io/part-of=dyvine \
              app.kubernetes.io/version=latest \
          | kubectl apply -f -

    - name: Render Ingress host
      env:
        INGRESS_HOST: ${{ env.INGRESS_HOST }}
      run: |
        # The production Ingress manifest keeps `INGRESS_HOST` as a literal
        # placeholder so that the file is a valid kustomize input. The actual
        # host is substituted at deploy time from the workflow env (which
        # already reads ``secrets.PROD_INGRESS_HOST``). Tell the runner to
        # mask the value so any follow-up step that echoes the rendered
        # manifest (for example ``kubectl diff``) cannot leak the host into
        # the public Actions log.
        echo "::add-mask::${INGRESS_HOST}"
        sed -i "s|INGRESS_HOST|${INGRESS_HOST}|g" k8s/overlays/production/ingress.yaml

    - name: Deploy to Production
      run: |
        # Build a temporary overlay under k8s/overlays/prod-runtime that
        # layers on top of the production overlay and injects the release
        # image tag, replica count, resource overrides, and env-specific
        # ConfigMap values. Using a dedicated directory keeps the
        # `kubectl apply -k` invocation valid (mixing -k and -f is not
        # supported by kubectl and would fail).
        RUNTIME_DIR=k8s/overlays/prod-runtime
        # Clean up the scratch kustomization on any exit path, including
        # ``kubectl apply`` failures under ``set -e``.
        trap 'rm -rf "${RUNTIME_DIR}"' EXIT
        mkdir -p "${RUNTIME_DIR}"
        cat > "${RUNTIME_DIR}/kustomization.yaml" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization

        namespace: dyvine

        resources:
          - ../production

        images:
          - name: ghcr.io/${{ github.repository }}
            newTag: ${{ needs.pre-deployment-checks.outputs.image-tag }}

        patches:
          - path: replicas-patch.yaml
            target:
              kind: Deployment
              name: dyvine-api
          - path: resources-patch.yaml
            target:
              kind: Deployment
              name: dyvine-api

        configMapGenerator:
          - name: dyvine-config
            behavior: merge
            literals:
              - API_DEBUG=false
              - API_ENVIRONMENT=production
              - R2_BUCKET_NAME=mmn-prod-data
              - API_VERSION=${{ needs.pre-deployment-checks.outputs.image-tag }}
        EOF

        cat > "${RUNTIME_DIR}/replicas-patch.yaml" << 'EOF'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: dyvine-api
        spec:
          replicas: 3
        EOF

        cat > "${RUNTIME_DIR}/resources-patch.yaml" << 'EOF'
        - op: replace
          path: /spec/template/spec/containers/0/resources
          value:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
        EOF

        kubectl apply -k "${RUNTIME_DIR}"

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/dyvine-api -n dyvine --timeout=600s

    - name: Run production smoke tests
      run: |
        # Wait for service to be ready
        sleep 30

        # Get service endpoint
        SERVICE_IP=$(kubectl get service dyvine-api -n dyvine -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

        if [ -z "$SERVICE_IP" ]; then
          echo "Warning: No external IP found, checking ingress..."
          kubectl get ingress -n dyvine
        else
          # Test readiness endpoint. We use /readyz (not /health) because
          # /health returns HTTP 200 even in "degraded" state, whereas
          # /readyz is the true readiness gate driving load-balancer
          # membership.
          curl -f http://${SERVICE_IP}:8000/readyz || exit 1
        fi

    - name: Production deployment summary
      run: |
        echo "🚀 Production deployment completed successfully!"
        echo "Version: ${{ needs.pre-deployment-checks.outputs.image-tag }}"
        echo "Environment: Production"
        echo "Namespace: dyvine"
        echo ""
        echo "Resources:"
        kubectl get pods -n dyvine -l app.kubernetes.io/name=dyvine
        kubectl get services -n dyvine
        kubectl get ingress -n dyvine
